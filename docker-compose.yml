version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/sitemind
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time — see frontend/Dockerfile.
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
